name: Build iOS

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build

      - run: npm install @capacitor/ios

      - run: npx cap add ios || true

      - run: npx cap sync ios

      - uses: actions/upload-artifact@v4
        with:
          name: ios-project
          path: ios
